<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SQL Injection Detector | Olanite Daniel Pelumi</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1>🔍 SQL Injection Detector</h1>
            <p>Advanced vulnerability scanner by Olanite Daniel Pelumi</p>
        </header>

        <main>
            <div class="scanner-form">
                <h2>New Scan</h2>
                <form id="scanForm">
                    <div class="form-group">
                        <label>Target URL</label>
                        <input type="url" id="url" name="url" placeholder="https://example.com/page.php?id=1" required>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label>Parameter</label>
                            <input type="text" id="parameter" name="parameter" placeholder="id" required>
                        </div>
                        
                        <div class="form-group">
                            <label>Method</label>
                            <select id="method" name="method">
                                <option value="GET">GET</option>
                                <option value="POST">POST</option>
                            </select>
                        </div>
                    </div>

                    <button type="submit" class="scan-btn">
                        <span class="btn-text">Start Scan</span>
                        <span class="btn-loader" style="display:none;">Scanning...</span>
                    </button>
                </form>
            </div>

            <div id="results" class="results-container" style="display:none;">
                <h2>Scan Results</h2>
                <div id="status" class="status"></div>
                <div id="findings" class="findings"></div>
                <div id="download-section" style="display:none; margin-top:20px;">
                    <a id="download-btn" href="#" class="download-btn">📥 Download Report</a>
                </div>
            </div>
        </main>

        <footer>
            <p>⚠️ For authorized testing only | © Olanite Daniel Pelumi</p>
        </footer>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
